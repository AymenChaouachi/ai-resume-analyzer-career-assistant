<mat-toolbar color="primary">

  <span>
    AI Resume Analyzer
  </span>

  <span class="spacer"></span>

  <button
    mat-button
    routerLink="/dashboard"
    *ngIf="isAuthenticated()"
  >
    Dashboard
  </button>

  <button
    mat-button
    routerLink="/upload"
    *ngIf="isAuthenticated()"
  >
    Upload
  </button>

  <button
    mat-button
    routerLink="/history"
    *ngIf="isAuthenticated()"
  >
    History
  </button>

  <button
    mat-button
    routerLink="/job-match"
    *ngIf="isAuthenticated()"
  >
    Job Match
  </button>

  <button
    mat-button
    *ngIf="isAuthenticated()"
    (click)="logout()"
  >
  Logout
  </button>

</mat-toolbar>
