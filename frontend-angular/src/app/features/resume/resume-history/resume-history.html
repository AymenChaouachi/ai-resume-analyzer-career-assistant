<section class="history-page">

  <div class="history-header">

    <h1>Resume History</h1>

    <button
      mat-raised-button
      color="primary"
      type="button"
      (click)="loadHistory()"
      [disabled]="isLoading()"
    >
      Refresh
    </button>

  </div>

  <p
    class="status"
    *ngIf="isLoading()"
  >
    Loading resume history...
  </p>

  <p
    class="error-message"
    *ngIf="errorMessage()"
  >
    {{ errorMessage() }}
  </p>

  <table *ngIf="histories().length > 0">

    <thead>
      <tr>
        <th>Resume</th>
        <th>ATS Score</th>
        <th>Best Match</th>
        <th>Uploaded At</th>
      </tr>
    </thead>

    <tbody>

      <tr *ngFor="let history of histories()">

        <td>
          {{ history.fileName }}
        </td>

        <td>
          {{ history.atsScore }}
        </td>

        <td>
          {{ history.bestJobMatch }}
        </td>

        <td>
          {{ history.uploadedAt | date: 'medium' }}
        </td>

      </tr>

    </tbody>

  </table>

  <p
    class="status"
    *ngIf="
      !isLoading() &&
      !errorMessage() &&
      histories().length === 0
    "
  >
    No resumes found.
  </p>

</section>
