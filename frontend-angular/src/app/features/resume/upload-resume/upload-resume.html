<div class="upload-container">

  <mat-card class="upload-card">

    <h1>
      AI Resume Analyzer
    </h1>

    <input
      type="file"
      (change)="onFileSelected($event)"
    />

    <button
      mat-raised-button
      color="primary"
      (click)="uploadResume()"
      [disabled]="!selectedFile"
    >
      Analyze Resume
    </button>

  </mat-card>

  <div *ngIf="analysisResult">

    <mat-card class="result-card">

      <h2>
        ATS Score
      </h2>

      <mat-progress-bar
        mode="determinate"
        [value]="analysisResult.analysis.ats_score"
      >
      </mat-progress-bar>

      <h1>
        {{ analysisResult.analysis.ats_score }}%
      </h1>

    </mat-card>

    <mat-card class="result-card">

      <h2>
        Technical Skills
      </h2>

      <mat-chip-set>

        <mat-chip
          *ngFor="
            let skill of
            analysisResult.analysis.technical_skills
          "
        >
          {{ skill }}
        </mat-chip>

      </mat-chip-set>

    </mat-card>

    <mat-card class="result-card">

      <h2>
        Soft Skills
      </h2>

      <mat-chip-set>

        <mat-chip
          *ngFor="
            let skill of
            analysisResult.analysis.soft_skills
          "
        >
          {{ skill }}
        </mat-chip>

      </mat-chip-set>

    </mat-card>

    <mat-card class="result-card">

      <h2>
        Best Job Match
      </h2>

      <h3>
        {{
          analysisResult.analysis.job_match.best_match
        }}
      </h3>

    </mat-card>

    <mat-card class="result-card">

      <h2>
        Recommendations
      </h2>

      <ul>

        <li
          *ngFor="
            let recommendation of
            analysisResult.analysis.recommendations
          "
        >
          {{ recommendation }}
        </li>

      </ul>

    </mat-card>

  </div>

</div>
