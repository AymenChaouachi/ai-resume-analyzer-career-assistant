<div class="upload-page">

  <mat-card class="upload-card">

    <mat-card-title>
      AI Resume Analyzer
    </mat-card-title>

    <mat-card-content>

      <input
        id="resume-file"
        class="file-input"
        type="file"
        accept=".pdf,.doc,.docx"
        (change)="onFileSelected($event)"
      />

      <label
        class="file-picker"
        for="resume-file"
      >
        {{ selectedFile()?.name || 'Choose resume file' }}
      </label>

      <button
        mat-raised-button
        color="primary"
        (click)="uploadResume()"
        [disabled]="!selectedFile() || isLoading()"
      >

        {{ isLoading() ? 'Analyzing...' : 'Analyze Resume' }}

      </button>

      <p
        class="error-message"
        *ngIf="errorMessage()"
      >
        {{ errorMessage() }}
      </p>

      <mat-progress-bar
        *ngIf="isLoading()"
        mode="indeterminate"
      ></mat-progress-bar>

    </mat-card-content>

  </mat-card>

  <ng-container *ngIf="analysisResult() as result">

  <mat-card
    class="result-card"
  >

    <mat-card-title>
      ATS Score
    </mat-card-title>

    <mat-card-content>

      <h1>
        {{ result.analysis.ats_score }}
      </h1>

      <p class="muted">
        Best match: {{ result.analysis.job_match.best_match }}
        ({{ result.analysis.job_match.score }})
      </p>

    </mat-card-content>

  </mat-card>

  <mat-card
    class="result-card"
  >

    <mat-card-title>
      Technical Skills
    </mat-card-title>

    <mat-card-content>

      <mat-chip-set>

        <mat-chip
          *ngFor="
            let skill of
            result.analysis.technical_skills
          "
        >
          {{ skill }}
        </mat-chip>

      </mat-chip-set>

    </mat-card-content>

  </mat-card>

  <mat-card class="result-card">

    <mat-card-title>
      Recommendations
    </mat-card-title>

    <mat-card-content>

      <ul class="recommendations">
        <li
          *ngFor="
            let recommendation of
            result.analysis.recommendations
          "
        >
          {{ recommendation }}
        </li>
      </ul>

    </mat-card-content>

  </mat-card>

  </ng-container>

</div>
